<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Small HTML Example - changes doing for remote</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Hello, World!</h1>
    <p id="message">This is a small HTML example.</p>
    <button onclick="changeMessage()">Click Me</button>

    <script>
        // Function to change the paragraph text
        function changeMessage() {
            document.getElementById("message").textContent = "You clicked the button!";
        }
    </script>

</body>
</html>
